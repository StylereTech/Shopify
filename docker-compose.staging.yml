version: '3.8'

# Local staging infrastructure for Storree Shopify App
# Provides PostgreSQL + Redis locally so the app can run with ngrok

services:
  postgres:
    image: postgres:16-alpine
    container_name: storree_shopify_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storree_shopify
    ports:
      - "5432:5432"
    volumes:
      - storree_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: storree_shopify_redis
    ports:
      - "6379:6379"
    volumes:
      - storree_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  storree_pg_data:
  storree_redis_data:
