name = "Storree Local Delivery"
client_id = "c2af2e125a8ffa0ae080ed4b06e1daf9"
application_url = "https://api-production-653e.up.railway.app/shopify/dashboard"
embedded = false

[access_scopes]
# write_shipping required for carrier service registration (Advanced/Plus plan)
# read_orders required for order webhook processing
# read_locations for merchant pickup location detection
scopes = "read_orders,write_shipping,read_locations"

[auth]
redirect_urls = [
  "https://api-production-653e.up.railway.app/shopify/auth/callback",
  "https://stylere.app/shopify/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "https://api-production-653e.up.railway.app/shopify/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "https://api-production-653e.up.railway.app/shopify/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://api-production-653e.up.railway.app/shopify/webhooks/compliance"
